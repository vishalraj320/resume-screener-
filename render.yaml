services:
  - type: web
    name: resume-screener
    runtime: node
    plan: free
    buildCommand: npm install && npx prisma generate && npx prisma db push && npm run build
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: resume-screener-db
          property: connectionString
      - key: NODE_VERSION
        value: "20"
    disk:
      name: uploads
      mountPath: /opt/render/project/src/uploads
      sizeGB: 1

databases:
  - name: resume-screener-db
    plan: free
    databaseName: resume_screener
    user: resume_screener
